# ╔══════════════════════════════════════════════════════════════╗
# ║  peak-linux — Kitty Terminal Config                        ║
# ║  macOS-inspired terminal appearance                        ║
# ╚══════════════════════════════════════════════════════════════╝

# ── Font ───────────────────────────────────────────────────────
font_family      JetBrainsMono Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        12.0

# ── Window ─────────────────────────────────────────────────────
window_padding_width     12
background_opacity       0.92
confirm_os_window_close  0
hide_window_decorations  yes
remember_window_size     yes
initial_window_width     120c
initial_window_height    35c

# ── Tab bar (macOS-style) ──────────────────────────────────────
tab_bar_edge             top
tab_bar_style            powerline
tab_powerline_style      slanted
active_tab_font_style    bold
inactive_tab_font_style  normal

# ── Cursor ─────────────────────────────────────────────────────
cursor_shape             beam
cursor_beam_thickness    1.5
cursor_blink_interval    0.5

# ── Scrollback ─────────────────────────────────────────────────
scrollback_lines         10000

# ── macOS-dark color scheme ────────────────────────────────────
foreground               #FFFFFF
background               #1C1C1E
selection_foreground     #FFFFFF
selection_background     #3A3A3C
cursor                   #FFFFFF
cursor_text_color        #1C1C1E

url_color                #007AFF
url_style                curly

# Tab bar colors
active_tab_foreground    #FFFFFF
active_tab_background    #3A3A3C
inactive_tab_foreground  #8E8E93
inactive_tab_background  #2C2C2E
tab_bar_background       #1C1C1E

# Normal colors
color0   #1C1C1E
color1   #FF3B30
color2   #30D158
color3   #FF9F0A
color4   #007AFF
color5   #BF5AF2
color6   #64D2FF
color7   #D1D1D6

# Bright colors
color8   #3A3A3C
color9   #FF453A
color10  #32D74B
color11  #FFD60A
color12  #0A84FF
color13  #DA8FFF
color14  #70D7FF
color15  #FFFFFF

# ── Bell ───────────────────────────────────────────────────────
enable_audio_bell        no
visual_bell_duration     0.0

# ── Keybindings ────────────────────────────────────────────────
map ctrl+shift+t     new_tab
map ctrl+shift+w     close_tab
map ctrl+shift+right next_tab
map ctrl+shift+left  previous_tab
map ctrl+shift+plus  change_font_size all +1.0
map ctrl+shift+minus change_font_size all -1.0
map ctrl+shift+0     change_font_size all 0
