; peak-linux — Polybar Configuration
; macOS-style translucent floating top bar

[colors]
background = #cc1e1e1e
background-alt = #cc3a3a3c
foreground = #ffffff
foreground-dim = #99ffffff
blue = #007AFF
green = #30D158
yellow = #FF9F0A
red = #FF3B30
purple = #BF5AF2
transparent = #00000000

; ── Main Bar ──────────────────────────────────────────────────
[bar/main]
width = 98%
height = 32
offset-x = 1%
offset-y = 6
radius = 14
fixed-center = true
bottom = false

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 2
line-color = ${colors.blue}

border-size = 0

padding-left = 1
padding-right = 1

module-margin-left = 0
module-margin-right = 0

font-0 = "Inter:size=12;3"
font-1 = "JetBrainsMono Nerd Font:size=13;4"
font-2 = "JetBrainsMono Nerd Font:size=16;5"
font-3 = "JetBrainsMono Nerd Font:size=11;3"

modules-left = apple sep bspwm
modules-center = date
modules-right = tray sep2 network sep2 bluetooth sep2 pulseaudio sep2 backlight sep2 battery sep2 power

override-redirect = true
wm-restack = bspwm

cursor-click = pointer
cursor-scroll = ns-resize

enable-ipc = true

; ── Modules: Left ─────────────────────────────────────────────
[module/apple]
type = custom/text
content = "%{T3} %{T-}"
content-foreground = ${colors.foreground}
content-padding = 1
click-left = rofi -show drun -theme spotlight

[module/sep]
type = custom/text
content = " "

[module/sep2]
type = custom/text
content = "%{T4} %{T-}"
content-foreground = #33ffffff

[module/bspwm]
type = internal/bspwm
pin-workspaces = true
inline-mode = false
enable-click = true
enable-scroll = true
reverse-scroll = false

format = <label-state> <label-mode>

label-focused = %name%
label-focused-background = #44007AFF
label-focused-foreground = ${colors.foreground}
label-focused-padding = 1
label-focused-font = 1

label-occupied = %name%
label-occupied-foreground = ${colors.foreground-dim}
label-occupied-padding = 1
label-occupied-font = 1

label-urgent = %name%
label-urgent-background = #44FF3B30
label-urgent-foreground = ${colors.foreground}
label-urgent-padding = 1
label-urgent-font = 1

label-empty = %name%
label-empty-foreground = #33ffffff
label-empty-padding = 1
label-empty-font = 1

label-monocle = "[M]"
label-tiled = ""
label-floating = "[F]"

; ── Modules: Center ───────────────────────────────────────────
[module/date]
type = internal/date
interval = 1

date = "%a %b %d"
time = " %H:%M"

format-foreground = ${colors.foreground}
format-font = 1

label = %date%  %time%

; ── Modules: Right ────────────────────────────────────────────
[module/tray]
type = internal/tray
tray-spacing = 8
tray-padding = 4
tray-size = 60%

[module/network]
type = internal/network
interface-type = wireless
interval = 3

format-connected = <label-connected>
label-connected = "%{T2}󰖩%{T-}"
label-connected-foreground = ${colors.foreground-dim}

format-disconnected = <label-disconnected>
label-disconnected = "%{T2}󰖪%{T-}"
label-disconnected-foreground = #44ffffff

; Wired fallback
[module/network-wired]
type = internal/network
interface-type = wired
interval = 3

format-connected = <label-connected>
label-connected = "%{T2}󰈀%{T-}"
label-connected-foreground = ${colors.foreground-dim}

[module/bluetooth]
type = custom/script
exec = echo "%{T2}󰂯%{T-}"
interval = 30
click-left = blueman-manager
format-foreground = ${colors.foreground-dim}

[module/pulseaudio]
type = internal/pulseaudio
use-ui-max = true
interval = 5

format-volume = <label-volume>
label-volume = "%{T2}󰕾%{T-} %percentage%%"
label-volume-foreground = ${colors.foreground-dim}

format-muted = <label-muted>
label-muted = "%{T2}󰝟%{T-}"
label-muted-foreground = #44ffffff

click-right = pavucontrol

[module/backlight]
type = internal/backlight
card = intel_backlight
enable-scroll = true

format = <label>
label = "%{T2}󰃟%{T-} %percentage%%"
label-foreground = ${colors.foreground-dim}

[module/battery]
type = internal/battery
battery = BAT0
adapter = ACD
full-at = 99
low-at = 15

format-charging = <label-charging>
label-charging = "%{T2}󰂄%{T-} %percentage%%"
label-charging-foreground = ${colors.green}

format-discharging = <label-discharging>
label-discharging = "%{T2}󰁹%{T-} %percentage%%"
label-discharging-foreground = ${colors.foreground-dim}

format-full = <label-full>
label-full = "%{T2}󰚥%{T-} %percentage%%"
label-full-foreground = ${colors.green}

format-low = <label-low>
label-low = "%{T2}󰂎%{T-} %percentage%%"
label-low-foreground = ${colors.red}

[module/power]
type = custom/text
content = "%{T2}⏻%{T-}"
content-foreground = #66ffffff
content-padding = 1
click-left = systemctl poweroff
click-right = systemctl reboot

; ── Global ────────────────────────────────────────────────────
[settings]
screenchange-reload = true
pseudo-transparency = false
