# ╔══════════════════════════════════════════════════════════════╗
# ║  peak-linux — Starship Prompt                             ║
# ║  Clean, minimal, macOS-inspired colors                     ║
# ╚══════════════════════════════════════════════════════════════╝

format = """
$directory\
$git_branch\
$git_status\
$python\
$nodejs\
$rust\
$cmd_duration\
$line_break\
$character"""

[character]
success_symbol = "[❯](bold #007AFF)"
error_symbol = "[❯](bold #FF3B30)"

[directory]
style = "bold #64D2FF"
truncation_length = 3
truncation_symbol = "…/"
read_only = " 🔒"

[git_branch]
symbol = " "
style = "bold #BF5AF2"

[git_status]
style = "bold #FF9F0A"
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
modified = "!${count}"
staged = "+${count}"
untracked = "?${count}"
conflicted = "=${count}"

[cmd_duration]
min_time = 2_000
style = "bold #8E8E93"
format = " [$duration]($style)"

[python]
symbol = " "
style = "#FF9F0A"

[nodejs]
symbol = " "
style = "#30D158"

[rust]
symbol = " "
style = "#FF3B30"
