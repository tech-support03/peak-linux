# ╔══════════════════════════════════════════════════════════════╗
# ║  peak-linux — Hyprland Configuration                       ║
# ║  macOS-inspired keybinds and window behavior                ║
# ╚══════════════════════════════════════════════════════════════╝

# ── Monitor ────────────────────────────────────────────────────
monitor=,preferred,auto,auto

# ── Autostart ──────────────────────────────────────────────────
exec-once = waybar
exec-once = dunst
exec-once = swww-daemon && swww img ~/.local/share/wallpapers/default.jpg --transition-type fade --transition-duration 1
exec-once = hypridle
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store
exec-once = nwg-dock-hyprland -d -i 48 -w 10 -mb 8 -hd 0 -ico

# ── Environment ────────────────────────────────────────────────
env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24
env = XCURSOR_THEME,WhiteSur-cursors
env = QT_QPA_PLATFORMTHEME,qt5ct
env = QT_QPA_PLATFORM,wayland;xcb
env = GDK_BACKEND,wayland,x11
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland
env = WLR_NO_HARDWARE_CURSORS,1
env = WLR_RENDERER_ALLOW_SOFTWARE,1

# ── Input ──────────────────────────────────────────────────────
input {
    kb_layout = us
    follow_mouse = 1
    sensitivity = 0

    touchpad {
        natural_scroll = true
    }
}

# ── General ────────────────────────────────────────────────────
general {
    gaps_in = 4
    gaps_out = 8
    border_size = 2
    col.active_border = rgba(007AFFEE) rgba(5856D6EE) 45deg
    col.inactive_border = rgba(3A3A3C88)
    resize_on_border = false
    allow_tearing = false
    layout = dwindle
}

# ── Decoration (macOS-like rounded corners + blur) ─────────────
decoration {
    rounding = 12
    rounding_power = 2

    active_opacity = 1.0
    inactive_opacity = 0.95

    shadow {
        enabled = true
        range = 20
        render_power = 3
        color = rgba(00000055)
    }

    blur {
        enabled = true
        size = 8
        passes = 3
        vibrancy = 0.2
    }
}

# ── Animations (smooth, macOS-like) ────────────────────────────
animations {
    enabled = true

    bezier = easeOutQuint, 0.23, 1, 0.32, 1
    bezier = easeInOutCubic, 0.65, 0.05, 0.36, 1
    bezier = linear, 0, 0, 1, 1
    bezier = almostLinear, 0.5, 0.5, 0.75, 1
    bezier = quick, 0.15, 0, 0.1, 1

    animation = global, 1, 10, default
    animation = border, 1, 5.39, easeOutQuint
    animation = windows, 1, 4.79, easeOutQuint
    animation = windowsIn, 1, 4.1, easeOutQuint, popin 87%
    animation = windowsOut, 1, 1.49, linear, popin 87%
    animation = fadeIn, 1, 1.73, almostLinear
    animation = fadeOut, 1, 1.46, almostLinear
    animation = fade, 1, 3.03, quick
    animation = layers, 1, 3.81, easeOutQuint
    animation = layersIn, 1, 4, easeOutQuint, fade
    animation = layersOut, 1, 1.5, linear, fade
    animation = fadeLayersIn, 1, 1.79, almostLinear
    animation = fadeLayersOut, 1, 1.39, almostLinear
    animation = workspaces, 1, 1.94, almostLinear, fade
    animation = workspacesIn, 1, 1.21, almostLinear, fade
    animation = workspacesOut, 1, 1.94, almostLinear, fade
}

# ── Layouts ────────────────────────────────────────────────────
dwindle {
    pseudotile = true
    preserve_split = true
}

# ── Misc ───────────────────────────────────────────────────────
misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
}

# ── Window Rules ───────────────────────────────────────────────
windowrule {
    name = float-thunar
    match:class = ^(thunar)$
    float = true
    size = 900 600
    center = true
}

windowrule {
    name = float-imv
    match:class = ^(imv)$
    float = true
}

windowrule {
    name = float-mpv
    match:class = ^(mpv)$
    float = true
}

windowrule {
    name = float-pip
    match:title = ^(Picture-in-Picture)$
    float = true
    pin = true
}

windowrule {
    name = float-calc
    match:class = ^(org.gnome.Calculator)$
    float = true
}

windowrule {
    name = float-pavucontrol
    match:class = ^(pavucontrol)$
    float = true
}

windowrule {
    name = float-nm
    match:class = ^(nm-connection-editor)$
    float = true
}

windowrule {
    name = float-blueman
    match:class = ^(blueman-manager)$
    float = true
}

windowrule {
    name = opacity-kitty
    match:class = ^(kitty)$
    opacity = 0.92
}

windowrule {
    name = opacity-thunar
    match:class = ^(thunar)$
    opacity = 0.95
}

windowrule {
    name = suppress-maximize-events
    match:class = .*
    suppress_event = maximize
}

# ── Keybindings ────────────────────────────────────────────────
$mod = SUPER

# App launchers
bind = $mod, Return, exec, kitty
bind = $mod, D, exec, wofi --show drun -I -a
bind = $mod, E, exec, thunar
bind = $mod, B, exec, firefox
bind = $mod, V, exec, cliphist list | wofi --dmenu | cliphist decode | wl-copy

# Window management
bind = $mod, Q, killactive,
bind = $mod SHIFT, Q, exit,
bind = $mod, F, fullscreen, 0
bind = $mod, M, fullscreen, 1
bind = $mod, T, togglefloating,
bind = $mod, P, pseudo,
bind = $mod, J, layoutmsg, togglesplit
bind = $mod, G, togglegroup,

# Focus movement
bind = $mod, H, movefocus, l
bind = $mod, L, movefocus, r
bind = $mod, K, movefocus, u
bind = $mod, J, movefocus, d

bind = $mod, Left, movefocus, l
bind = $mod, Right, movefocus, r
bind = $mod, Up, movefocus, u
bind = $mod, Down, movefocus, d

# Window movement
bind = $mod SHIFT, H, movewindow, l
bind = $mod SHIFT, L, movewindow, r
bind = $mod SHIFT, K, movewindow, u
bind = $mod SHIFT, J, movewindow, d

# Resize
binde = $mod CTRL, H, resizeactive, -30 0
binde = $mod CTRL, L, resizeactive, 30 0
binde = $mod CTRL, K, resizeactive, 0 -30
binde = $mod CTRL, J, resizeactive, 0 30

# Workspaces
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9

# Move window to workspace
bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod SHIFT, 6, movetoworkspace, 6
bind = $mod SHIFT, 7, movetoworkspace, 7
bind = $mod SHIFT, 8, movetoworkspace, 8
bind = $mod SHIFT, 9, movetoworkspace, 9

# Scroll through workspaces
bind = $mod, mouse_down, workspace, e+1
bind = $mod, mouse_up, workspace, e-1

# Mouse bindings
bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow

# Screenshots
bind = , Print, exec, grim - | wl-copy
bind = SHIFT, Print, exec, grim -g "$(slurp)" - | wl-copy
bind = $mod, Print, exec, grim ~/Pictures/screenshot-$(date +%Y%m%d-%H%M%S).png

# Media / brightness
bindel = , XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPrev, exec, playerctl previous
bindel = , XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+
bindel = , XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-

# Lock screen
bind = $mod CTRL, L, exec, hyprlock

# Lid switch
bindl = , switch:Lid Switch, exec, hyprlock

source = ~/.config/hypr/local.conf
