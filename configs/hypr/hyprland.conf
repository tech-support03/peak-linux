# ╔══════════════════════════════════════════════════════════════╗
# ║  peak-linux — Hyprland Configuration                       ║
# ║  macOS-inspired keybinds and window behavior                ║
# ╚══════════════════════════════════════════════════════════════╝

# ── Monitor ────────────────────────────────────────────────────
# Adjust to your setup: monitor = name, resolution, position, scale
monitor = , preferred, auto, 1

# ── Autostart ──────────────────────────────────────────────────
exec-once = waybar
exec-once = dunst
exec-once = swww-daemon && swww img ~/.local/share/wallpapers/default.jpg --transition-type fade --transition-duration 1
exec-once = hyprpaper
exec-once = hypridle
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store
exec-once = nwg-dock-hyprland -d -i 48 -w 10 -mb 8 -hd 0 -ico

# ── Environment ────────────────────────────────────────────────
env = XCURSOR_SIZE,24
env = XCURSOR_THEME,WhiteSur-cursors
env = QT_QPA_PLATFORMTHEME,qt5ct
env = QT_QPA_PLATFORM,wayland;xcb
env = GDK_BACKEND,wayland,x11
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland

# ── Input ──────────────────────────────────────────────────────
input {
    kb_layout = us
    follow_mouse = 1
    sensitivity = 0
    touchpad {
        natural_scroll = true
        tap-to-click = true
        drag_lock = true
        disable_while_typing = true
    }
}

# ── General ────────────────────────────────────────────────────
general {
    gaps_in = 4
    gaps_out = 8
    border_size = 2
    col.active_border = rgba(007AFFEE) rgba(5856D6EE) 45deg
    col.inactive_border = rgba(3A3A3C88)
    layout = dwindle
    allow_tearing = false
}

# ── Decoration (macOS-like rounded corners + blur) ─────────────
decoration {
    rounding = 12

    blur {
        enabled = true
        size = 8
        passes = 3
        new_optimizations = true
        xray = false
        noise = 0.02
        contrast = 1.0
        brightness = 1.0
        vibrancy = 0.2
    }

    shadow {
        enabled = true
        range = 20
        render_power = 3
        color = rgba(00000055)
    }
}

# ── Animations (smooth, macOS-like) ────────────────────────────
animations {
    enabled = true
    bezier = macOS, 0.25, 1, 0.5, 1
    bezier = popIn, 0.1, 0.8, 0.2, 1.0
    bezier = linear, 0.0, 0.0, 1.0, 1.0

    animation = windows, 1, 4, macOS, slide
    animation = windowsIn, 1, 4, popIn, popin 80%
    animation = windowsOut, 1, 4, macOS, slide
    animation = fade, 1, 3, macOS
    animation = workspaces, 1, 4, macOS, slide
    animation = layers, 1, 3, macOS, fade
}

# ── Layouts ────────────────────────────────────────────────────
dwindle {
    pseudotile = true
    preserve_split = true
    force_split = 2
}

# ── Misc ───────────────────────────────────────────────────────
misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
    disable_splash_rendering = true
    vfr = true
}

# ── Window Rules ───────────────────────────────────────────────
windowrulev2 = float, class:^(thunar)$
windowrulev2 = size 900 600, class:^(thunar)$
windowrulev2 = center, class:^(thunar)$

windowrulev2 = float, class:^(imv)$
windowrulev2 = float, class:^(mpv)$
windowrulev2 = float, title:^(Picture-in-Picture)$
windowrulev2 = pin, title:^(Picture-in-Picture)$

windowrulev2 = float, class:^(org.gnome.Calculator)$
windowrulev2 = float, class:^(pavucontrol)$
windowrulev2 = float, class:^(nm-connection-editor)$
windowrulev2 = float, class:^(blueman-manager)$

# Opacity for specific apps
windowrulev2 = opacity 0.92, class:^(kitty)$
windowrulev2 = opacity 0.95, class:^(thunar)$

# ── Keybindings ────────────────────────────────────────────────
$mod = SUPER

# App launchers
bind = $mod, Return, exec, kitty
bind = $mod, D, exec, wofi --show drun -I -a
bind = $mod, E, exec, thunar
bind = $mod, B, exec, firefox
bind = $mod, V, exec, cliphist list | wofi --dmenu | cliphist decode | wl-copy

# Window management
bind = $mod, Q, killactive
bind = $mod SHIFT, Q, exit
bind = $mod, F, fullscreen, 0
bind = $mod, M, fullscreen, 1
bind = $mod, T, togglefloating
bind = $mod, P, pseudo
bind = $mod, S, togglesplit
bind = $mod, G, togglegroup

# Focus movement
bind = $mod, H, movefocus, l
bind = $mod, L, movefocus, r
bind = $mod, K, movefocus, u
bind = $mod, J, movefocus, d

bind = $mod, Left, movefocus, l
bind = $mod, Right, movefocus, r
bind = $mod, Up, movefocus, u
bind = $mod, Down, movefocus, d

# Window movement
bind = $mod SHIFT, H, movewindow, l
bind = $mod SHIFT, L, movewindow, r
bind = $mod SHIFT, K, movewindow, u
bind = $mod SHIFT, J, movewindow, d

# Resize
binde = $mod CTRL, H, resizeactive, -30 0
binde = $mod CTRL, L, resizeactive, 30 0
binde = $mod CTRL, K, resizeactive, 0 -30
binde = $mod CTRL, J, resizeactive, 0 30

# Workspaces
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9

# Move window to workspace
bind = $mod SHIFT, 1, movetoworkspacesilent, 1
bind = $mod SHIFT, 2, movetoworkspacesilent, 2
bind = $mod SHIFT, 3, movetoworkspacesilent, 3
bind = $mod SHIFT, 4, movetoworkspacesilent, 4
bind = $mod SHIFT, 5, movetoworkspacesilent, 5
bind = $mod SHIFT, 6, movetoworkspacesilent, 6
bind = $mod SHIFT, 7, movetoworkspacesilent, 7
bind = $mod SHIFT, 8, movetoworkspacesilent, 8
bind = $mod SHIFT, 9, movetoworkspacesilent, 9

# Scroll through workspaces
bind = $mod, mouse_down, workspace, e+1
bind = $mod, mouse_up, workspace, e-1

# Mouse bindings
bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow

# Screenshots
bind = , Print, exec, grim - | wl-copy
bind = SHIFT, Print, exec, grim -g "$(slurp)" - | wl-copy
bind = $mod, Print, exec, grim ~/Pictures/screenshot-$(date +%Y%m%d-%H%M%S).png

# Media / brightness
binde = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
binde = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bind  = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bind  = , XF86AudioPlay, exec, playerctl play-pause
bind  = , XF86AudioNext, exec, playerctl next
bind  = , XF86AudioPrev, exec, playerctl previous
binde = , XF86MonBrightnessUp, exec, brightnessctl set +5%
binde = , XF86MonBrightnessDown, exec, brightnessctl set 5%-

# Lock screen
bind = $mod CTRL, L, exec, hyprlock

# Lid switch
bindl = , switch:Lid Switch, exec, hyprlock

source = ~/.config/hypr/local.conf
