# peak-linux — Hyprlock config (macOS-inspired lock screen)

background {
    monitor =
    path = ~/.local/share/wallpapers/default.jpg
    blur_passes = 3
    blur_size = 8
    noise = 0.02
    contrast = 0.9
    brightness = 0.6
    vibrancy = 0.2
}

input-field {
    monitor =
    size = 300, 50
    outline_thickness = 2
    dots_size = 0.25
    dots_spacing = 0.3
    dots_center = true
    outer_color = rgba(007AFF88)
    inner_color = rgba(1C1C1ECC)
    font_color = rgb(FFFFFF)
    fade_on_empty = true
    placeholder_text = <i>Enter Password...</i>
    hide_input = false
    rounding = 25
    check_color = rgb(34C759)
    fail_color = rgb(FF3B30)
    fail_text = <i>Authentication failed</i>
    position = 0, -80
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%H:%M")"
    color = rgba(FFFFFFEE)
    font_size = 72
    font_family = Inter Bold
    position = 0, 120
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:60000] echo "$(date +"%A, %B %d")"
    color = rgba(FFFFFFBB)
    font_size = 20
    font_family = Inter
    position = 0, 50
    halign = center
    valign = center
}
