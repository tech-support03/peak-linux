# peak-linux — Picom Compositor Configuration
# macOS-inspired blur, shadows, rounded corners, and animations

# ── Backend ───────────────────────────────────────────────────
backend = "glx";
vsync = true;
glx-no-stencil = true;
glx-no-rebind-pixmap = true;
use-damage = true;
log-level = "warn";

# ── Shadows (macOS-like soft drop shadow) ─────────────────────
shadow = true;
shadow-radius = 20;
shadow-offset-x = -20;
shadow-offset-y = -20;
shadow-opacity = 0.35;

shadow-exclude = [
    "name = 'Polybar'",
    "class_g = 'Plank'",
    "class_g = 'slop'",
    "class_g = 'Rofi'",
    "window_type = 'dock'",
    "window_type = 'desktop'",
    "_GTK_FRAME_EXTENTS@:c"
];

# ── Rounded Corners ───────────────────────────────────────────
corner-radius = 12;

rounded-corners-exclude = [
    "window_type = 'dock'",
    "window_type = 'desktop'",
    "class_g = 'Polybar'",
    "class_g = 'Plank'",
    "class_g = 'Rofi'"
];

# ── Blur (dual kawase — macOS Monterey-like) ──────────────────
blur-method = "dual_kawase";
blur-strength = 6;

blur-background-exclude = [
    "window_type = 'dock'",
    "window_type = 'desktop'",
    "class_g = 'slop'",
    "_GTK_FRAME_EXTENTS@:c"
];

# ── Opacity ───────────────────────────────────────────────────
inactive-opacity = 0.95;
active-opacity = 1.0;
frame-opacity = 1.0;
inactive-opacity-override = false;

opacity-rule = [
    "92:class_g = 'kitty' && focused",
    "88:class_g = 'kitty' && !focused",
    "95:class_g = 'Thunar'"
];

# ── Fading ────────────────────────────────────────────────────
fading = true;
fade-in-step = 0.04;
fade-out-step = 0.04;
fade-delta = 5;

fade-exclude = [
    "class_g = 'slop'"
];

# ── Animations (picom v12+ syntax) ────────────────────────────
animations = (
    {
        triggers = ["open", "show"];
        opacity = {
            curve = "cubic-bezier(0.23, 1, 0.32, 1)";
            duration = 0.3;
            start = 0;
            end = "window-raw-opacity-before";
        };
        blur-opacity = "opacity";
        shadow-opacity = "opacity";
        offset-x = "(1 - scale-x) / 2 * window-width";
        offset-y = "(1 - scale-y) / 2 * window-height";
        scale-x = {
            curve = "cubic-bezier(0.23, 1, 0.32, 1)";
            duration = 0.3;
            start = 0.9;
            end = 1;
        };
        scale-y = "scale-x";
    },
    {
        triggers = ["close", "hide"];
        opacity = {
            curve = "cubic-bezier(0.23, 1, 0.32, 1)";
            duration = 0.2;
            start = "window-raw-opacity-before";
            end = 0;
        };
        blur-opacity = "opacity";
        shadow-opacity = "opacity";
        offset-x = "(1 - scale-x) / 2 * window-width";
        offset-y = "(1 - scale-y) / 2 * window-height";
        scale-x = {
            curve = "cubic-bezier(0.23, 1, 0.32, 1)";
            duration = 0.2;
            start = 1;
            end = 0.9;
        };
        scale-y = "scale-x";
    },
    {
        triggers = ["geometry"];
        scale-x = {
            curve = "cubic-bezier(0.23, 1, 0.32, 1)";
            duration = 0.3;
        };
        scale-y = "scale-x";
    }
);

# ── Window Type Rules ─────────────────────────────────────────
wintypes:
{
    tooltip = { fade = true; shadow = true; opacity = 0.95; };
    dock = { shadow = false; clip-shadow-above = true; };
    dnd = { shadow = false; };
    popup_menu = { opacity = 0.95; shadow = true; };
    dropdown_menu = { opacity = 0.95; shadow = true; };
};
