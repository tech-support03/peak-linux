name: Build ISO

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - 'iso/**'
      - 'configs/**'
      - 'install.sh'
      - '.github/workflows/build-iso.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fix line endings
        run: |
          # Convert ALL text files to LF (git on Windows may have added CRLF)
          find . -path ./.git -prune -o -type f -print0 | xargs -0 sed -i 's/\r$//'

      - name: Build ISO in Arch container
        run: |
          docker run --rm --privileged \
            -v "${{ github.workspace }}:/workspace" \
            archlinux:latest \
            bash -c '
              set -euo pipefail

              echo "::group::Setup Arch environment"
              # Initialize pacman keyring and update
              pacman-key --init
              pacman-key --populate archlinux
              pacman -Syu --noconfirm
              pacman -S --noconfirm archiso git dosfstools e2fsprogs squashfs-tools libisoburn mtools grub syslinux
              echo "::endgroup::"

              echo "::group::Prepare profile"
              cd /workspace

              # Fix any remaining CRLF line endings (all text files)
              find . -path ./.git -prune -o -type f -print0 | xargs -0 sed -i "s/\r$//"

              PROFILE_DIR="/workspace/iso/profile"
              AIROOTFS="$PROFILE_DIR/airootfs"

              # Copy peak-linux configs into airootfs
              mkdir -p "$AIROOTFS/root/peak-linux"
              cp -r /workspace/configs "$AIROOTFS/root/peak-linux/"
              cp /workspace/install.sh "$AIROOTFS/root/peak-linux/"

              # Copy guided installer
              cp /workspace/iso/peak-installer.sh "$AIROOTFS/root/peak-installer.sh"
              chmod +x "$AIROOTFS/root/peak-installer.sh"

              # Set permissions on airootfs files
              chmod 750 "$AIROOTFS/root"
              chmod 755 "$AIROOTFS/root/peak-installer.sh"
              chmod 400 "$AIROOTFS/etc/shadow"

              # Enable services in the live environment via symlinks
              mkdir -p "$AIROOTFS/etc/systemd/system/multi-user.target.wants"
              mkdir -p "$AIROOTFS/etc/systemd/system/network-online.target.wants"

              ln -sf /usr/lib/systemd/system/NetworkManager.service \
                "$AIROOTFS/etc/systemd/system/multi-user.target.wants/NetworkManager.service"
              ln -sf /usr/lib/systemd/system/NetworkManager-wait-online.service \
                "$AIROOTFS/etc/systemd/system/network-online.target.wants/NetworkManager-wait-online.service"
              ln -sf /usr/lib/systemd/system/iwd.service \
                "$AIROOTFS/etc/systemd/system/multi-user.target.wants/iwd.service"
              ln -sf /usr/lib/systemd/system/sshd.service \
                "$AIROOTFS/etc/systemd/system/multi-user.target.wants/sshd.service"

              echo "::endgroup::"

              echo "::group::Build ISO"
              mkdir -p /workspace/iso/out /tmp/peak-build

              mkarchiso -v \
                -w /tmp/peak-build \
                -o /workspace/iso/out \
                "$PROFILE_DIR"

              echo "::endgroup::"

              echo "::group::Build results"
              ls -lh /workspace/iso/out/
              echo "::endgroup::"
            '

      - name: Upload ISO artifact
        uses: actions/upload-artifact@v4
        with:
          name: peak-linux-iso
          path: iso/out/*.iso
          retention-days: 7
          compression-level: 0

      - name: Create release (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: iso/out/*.iso
